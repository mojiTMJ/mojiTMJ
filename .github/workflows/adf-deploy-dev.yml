name: ADF – Deploy to Dev

on:
  push:
    branches:
      - dev
    paths:
      - 'pipeline/**'
      - 'dataset/**'
      - 'linkedService/**'
      - 'trigger/**'
      - 'dataflow/**'
      - 'integrationRuntime/**'
      - 'factory/**'
      - 'environments/dev-parameters.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  RESOURCE_GROUP: ${{ secrets.ADF_RESOURCE_GROUP_DEV }}
  FACTORY_NAME:   ${{ secrets.ADF_FACTORY_NAME_DEV }}

jobs:
  deploy-dev:
    name: Deploy to Dev ADF
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Stop ADF Triggers (pre-deploy)
        uses: azure/powershell@v2
        with:
          inlineScript: |
            ./scripts/pre-post-deploy.ps1 `
              -ResourceGroupName "$env:RESOURCE_GROUP" `
              -DataFactoryName   "$env:FACTORY_NAME" `
              -Action            "stop"
          azPSVersion: latest

      - name: Deploy ADF ARM Template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./factory/ARMTemplateForFactory.json
          parameters: >
            ./factory/ARMTemplateParametersForFactory.json
            ./environments/dev-parameters.json
          deploymentName: adf-dev-${{ github.run_number }}

      - name: Start ADF Triggers (post-deploy)
        if: always()
        uses: azure/powershell@v2
        with:
          inlineScript: |
            ./scripts/pre-post-deploy.ps1 `
              -ResourceGroupName "$env:RESOURCE_GROUP" `
              -DataFactoryName   "$env:FACTORY_NAME" `
              -Action            "start"
          azPSVersion: latest

      - name: Azure Logout
        if: always()
        run: az logout
