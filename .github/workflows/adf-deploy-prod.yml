name: ADF – Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'pipeline/**'
      - 'dataset/**'
      - 'linkedService/**'
      - 'trigger/**'
      - 'dataflow/**'
      - 'integrationRuntime/**'
      - 'factory/**'
      - 'environments/prod-parameters.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  RESOURCE_GROUP: ${{ secrets.ADF_RESOURCE_GROUP_PROD }}
  FACTORY_NAME:   ${{ secrets.ADF_FACTORY_NAME_PROD }}

jobs:
  deploy-prod:
    name: Deploy to Production ADF
    runs-on: ubuntu-latest
    # The 'production' GitHub environment enforces manual approval gate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate ARM Template before deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./factory/ARMTemplateForFactory.json
          parameters: >
            ./factory/ARMTemplateParametersForFactory.json
            ./environments/prod-parameters.json
          deploymentMode: Validate

      - name: Stop ADF Triggers (pre-deploy)
        uses: azure/powershell@v2
        with:
          inlineScript: |
            ./scripts/pre-post-deploy.ps1 `
              -ResourceGroupName "$env:RESOURCE_GROUP" `
              -DataFactoryName   "$env:FACTORY_NAME" `
              -Action            "stop"
          azPSVersion: latest

      - name: Deploy ADF ARM Template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./factory/ARMTemplateForFactory.json
          parameters: >
            ./factory/ARMTemplateParametersForFactory.json
            ./environments/prod-parameters.json
          deploymentName: adf-prod-${{ github.run_number }}

      - name: Start ADF Triggers (post-deploy)
        if: always()
        uses: azure/powershell@v2
        with:
          inlineScript: |
            ./scripts/pre-post-deploy.ps1 `
              -ResourceGroupName "$env:RESOURCE_GROUP" `
              -DataFactoryName   "$env:FACTORY_NAME" `
              -Action            "start"
          azPSVersion: latest

      - name: Tag Production Release
        if: success()
        run: |
          VERSION="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Azure Logout
        if: always()
        run: az logout
