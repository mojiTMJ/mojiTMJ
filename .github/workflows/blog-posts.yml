name: 📝 Update latest blog posts

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    name: Pull latest posts from feeds
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          # Replace with your actual blog feed when you have one. Examples:
          #   dev.to:   https://dev.to/feed/<your-handle>
          #   medium:   https://medium.com/feed/@<your-handle>
          #   personal: https://<yourdomain>/feed.xml
          # Until then we point at dev.to's main feed so the workflow stays green.
          feed_list: "https://dev.to/feed"
          max_post_count: 5
          template: "- [$title]($url) <kbd>$date</kbd>"
          commit_message: "chore: refresh latest blog posts"
          disable_item_validation: true
